name: albion-tool-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: albion_tool
      POSTGRES_USER: albion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albion -d albion_tool"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Connection pooler devant PostgreSQL (critique en production)
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: always
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: albion_tool
      DATABASES_USER: albion
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: production
    restart: always
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    environment:
      # Via pgbouncer en prod + ?pgbouncer=true pour Prisma
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@pgbouncer:5432/albion_tool?pgbouncer=true
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      NODE_ENV: production
      APP_URL: ${APP_URL}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
