name: albion-tool-prod

services:
  postgres:
    image: k0bus/albion-silvermind-postgres:${IMAGE_TAG:-latest}
    restart: always
    environment:
      POSTGRES_DB: albion_tool
      POSTGRES_USER: albion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albion -d albion_tool"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Connection pooler devant PostgreSQL (critique en production)
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: always
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: albion_tool
      DATABASES_USER: albion
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: k0bus/albion-silvermind-app:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@postgres:5432/albion_tool
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_REDIS_HOST: redis
      NUXT_REDIS_PORT: 6379
      NUXT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      NODE_ENV: production
      APP_URL: ${APP_URL}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    image: k0bus/albion-silvermind-worker:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@postgres:5432/albion_tool
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: k0bus/albion-silvermind-nginx:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
