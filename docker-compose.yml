name: albion-tool

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: albion_tool
      POSTGRES_USER: albion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albion -d albion_tool"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-albion_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-albion_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-albion-icons}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/$${MINIO_BUCKET};
      mc anonymous set public myminio/$${MINIO_BUCKET};
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@postgres:5432/albion_tool
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-albion_minio}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-albion-icons}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      NODE_ENV: development
      APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.nuxt
      - /app/packages/database/node_modules
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@postgres:5432/albion_tool
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-albion_minio}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-albion-icons}
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/database/node_modules

  db-studio:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://albion:${POSTGRES_PASSWORD}@postgres:5432/albion_tool
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/database/node_modules
    ports:
      - "51212:51212"
    command: pnpm --filter @albion-tool/database db:studio --browser none

volumes:
  postgres_data:
  redis_data:
  minio_data:
